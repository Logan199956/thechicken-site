<h2>🌍 Chicken World Map</h2>
<p>Click a region to discover chicken activity 🐔</p>

  <!-- Clickable regions -->
  <div class="region australia" onclick="showInfo('australia')"></div>

  <div class="region americas" onclick="showInfo('americas')"></div>

</div>

</main>
